services:
  db:
    build:
      context: ./backend/database
    container_name: cities_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - backend-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: cities_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
    networks:
      - backend-db
      - frontend-backend

  frontend:
    build:
      context: ./frontend
    container_name: cities_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - frontend-backend

networks:
  backend-db:
  frontend-backend: